<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Labor-Quiz | Chemie Klasse 7</title>
<style>
  @import url('https://fonts.bunny.net/css?family=fredoka-one:400|nunito:400,600,700,800,900');

  :root {
    --bg: #0f0e17;
    --surface: #1a1a2e;
    --card: #16213e;
    --accent1: #ff6b6b;
    --accent2: #ffd166;
    --accent3: #06d6a0;
    --accent4: #118ab2;
    --text: #fffffe;
    --text-muted: #a7a9be;
    --radius: 16px;
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(6,214,160,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(255,107,107,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 50%, rgba(17,138,178,0.04) 0%, transparent 70%);
    z-index: 0;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 920px;
    margin: 0 auto;
    padding: 20px;
  }

  .header {
    text-align: center;
    padding: 28px 0 18px;
  }

  .header h1 {
    font-family: 'Fredoka One', sans-serif;
    font-size: clamp(1.9rem, 5vw, 3rem);
    background: linear-gradient(135deg, var(--accent3), var(--accent4), var(--accent1));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p { color: var(--text-muted); font-size: 0.95rem; margin-top: 6px; font-weight: 600; }

  /* SCORE BAR */
  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card);
    border-radius: var(--radius);
    padding: 12px 22px;
    margin-bottom: 20px;
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: var(--shadow);
    flex-wrap: wrap;
    gap: 8px;
  }

  .score-item { text-align: center; }
  .score-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); font-weight: 700; }
  .score-value { font-family: 'Fredoka One', sans-serif; font-size: 1.9rem; line-height: 1; color: var(--accent2); }
  .score-value.green { color: var(--accent3); }
  .score-value.red { color: var(--accent1); }

  /* TABS */
  .game-selector {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .game-tab {
    background: var(--card);
    border: 2px solid rgba(255,255,255,0.07);
    border-radius: var(--radius);
    padding: 13px 6px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s ease;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .game-tab .tab-icon { font-size: 1.6rem; display: block; margin-bottom: 5px; }
  .game-tab:hover { border-color: rgba(255,255,255,0.2); color: var(--text); transform: translateY(-2px); }
  .game-tab.active {
    border-color: var(--accent3);
    background: linear-gradient(135deg, rgba(6,214,160,0.15), rgba(17,138,178,0.1));
    color: var(--text);
    transform: translateY(-2px);
    box-shadow: 0 0 18px rgba(6,214,160,0.2);
  }

  /* GAME AREA */
  .game-area {
    background: var(--card);
    border-radius: var(--radius);
    padding: 26px;
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: var(--shadow);
    min-height: 420px;
  }

  .game-title {
    font-family: 'Fredoka One', sans-serif;
    font-size: 1.05rem;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .game-title span { color: var(--text); font-size: 1.25rem; }

  .progress-bar-wrap { background: rgba(255,255,255,0.07); border-radius: 30px; height: 7px; margin-bottom: 18px; overflow: hidden; }
  .progress-bar-fill { height: 100%; border-radius: 30px; background: linear-gradient(90deg, var(--accent3), var(--accent4)); transition: width 0.4s ease; }

  /* QUIZ GAME */
  .device-svg-wrap {
    width: 150px; height: 150px;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid rgba(255,255,255,0.1);
    animation: float 3s ease-in-out infinite;
    margin: 0 auto 10px;
  }
  .device-svg-wrap svg { width: 105px; height: 105px; }

  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

  .device-hint { font-size: 0.78rem; color: var(--text-muted); font-style: italic; text-align: center; margin-bottom: 16px; }

  .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; margin-top: 8px; }

  .answer-btn {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 13px 10px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
  }
  .answer-btn:hover:not(:disabled) { background: rgba(255,255,255,0.1); border-color: var(--accent4); transform: scale(1.02); }
  .answer-btn.correct { background: rgba(6,214,160,0.25); border-color: var(--accent3); color: var(--accent3); }
  .answer-btn.wrong { background: rgba(255,107,107,0.2); border-color: var(--accent1); color: var(--accent1); }
  .answer-btn:disabled { cursor: default; }

  .feedback-msg {
    text-align: center;
    font-family: 'Fredoka One', sans-serif;
    font-size: 1.5rem;
    height: 46px;
    display: flex; align-items: center; justify-content: center;
    margin-top: 14px;
  }
  .feedback-msg.correct { color: var(--accent3); }
  .feedback-msg.wrong { color: var(--accent1); }

  /* MEMORY */
  .memory-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 9px;
  }

  .memory-card {
    aspect-ratio: 1;
    border-radius: 11px;
    cursor: pointer;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s ease;
  }
  .memory-card.flipped { transform: rotateY(180deg); }
  .memory-card.matched { transform: rotateY(180deg); cursor: default; }

  .card-front, .card-back {
    position: absolute; inset: 0;
    border-radius: 11px;
    backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .card-front {
    background: linear-gradient(135deg, var(--surface), var(--card));
    border: 2px solid rgba(255,255,255,0.1);
    font-size: 1.8rem;
    color: var(--accent4);
    font-weight: 900;
    font-family: 'Fredoka One', sans-serif;
  }
  .card-back {
    transform: rotateY(180deg);
    background: linear-gradient(135deg, rgba(17,138,178,0.3), rgba(6,214,160,0.2));
    border: 2px solid var(--accent4);
    flex-direction: column;
    gap: 3px;
    padding: 5px;
    text-align: center;
  }
  .card-back svg { width: 44px; height: 44px; }
  .card-back .card-label { font-size: 0.6rem; font-weight: 800; color: var(--text); line-height: 1.2; }
  .card-back.name-card {
    background: linear-gradient(135deg, rgba(255,209,102,0.25), rgba(255,107,107,0.2));
    border-color: var(--accent2);
    font-family: 'Fredoka One', sans-serif;
    font-size: 0.78rem;
    color: var(--accent2);
    padding: 6px;
    line-height: 1.3;
  }
  /* Matched cards: brighter border, no dimming */
  .memory-card.matched .card-back {
    border-color: var(--accent3);
    background: linear-gradient(135deg, rgba(6,214,160,0.25), rgba(6,214,160,0.1));
  }
  .memory-card.matched .card-back.name-card {
    border-color: var(--accent3);
    background: linear-gradient(135deg, rgba(6,214,160,0.2), rgba(6,214,160,0.08));
    color: var(--accent3);
  }
  .memory-info { text-align: center; font-family: 'Fredoka One', sans-serif; font-size: 1rem; margin-top: 14px; color: var(--text-muted); }

  /* DRAG GAME */
  .drag-area { display: flex; flex-direction: column; gap: 16px; }

  .devices-pool {
    display: flex; flex-wrap: wrap; gap: 9px;
    justify-content: center;
    min-height: 56px; padding: 10px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    border: 2px dashed rgba(255,255,255,0.1);
  }

  .drag-chip {
    background: linear-gradient(135deg, rgba(17,138,178,0.3), rgba(6,214,160,0.15));
    border: 2px solid var(--accent4);
    border-radius: 30px;
    padding: 7px 16px;
    font-weight: 800; font-size: 0.82rem;
    cursor: grab; transition: all 0.2s ease;
    user-select: none; color: var(--text); white-space: nowrap;
  }
  .drag-chip:hover { transform: scale(1.05); box-shadow: 0 4px 18px rgba(6,214,160,0.3); }
  .drag-chip.dragging { opacity: 0.45; cursor: grabbing; }

  .drop-zones { display: flex; flex-direction: column; gap: 10px; }

  .drop-row {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px; padding: 9px 12px;
  }

  .drop-desc { flex: 1; font-size: 0.8rem; color: var(--text-muted); font-weight: 600; line-height: 1.4; }

  .hint-btn {
    background: rgba(255,209,102,0.15);
    border: 1px solid rgba(255,209,102,0.4);
    border-radius: 8px;
    padding: 5px 10px;
    color: var(--accent2);
    font-family: 'Nunito', sans-serif;
    font-weight: 800; font-size: 0.72rem;
    cursor: pointer; transition: all 0.2s ease;
    white-space: nowrap; flex-shrink: 0;
  }
  .hint-btn:hover { background: rgba(255,209,102,0.28); }
  .hint-btn:disabled { opacity: 0.4; cursor: default; }

  .hint-svg-wrap {
    width: 0; overflow: hidden;
    transition: width 0.3s ease;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .hint-svg-wrap.visible { width: 52px; }
  .hint-svg-wrap svg { width: 44px; height: 44px; }

  .drop-zone {
    min-width: 120px; height: 36px;
    border: 2px dashed rgba(255,255,255,0.2);
    border-radius: 30px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem; color: var(--text-muted); font-weight: 700;
    transition: all 0.2s ease; flex-shrink: 0;
  }
  .drop-zone.drag-over { border-color: var(--accent3); background: rgba(6,214,160,0.1); color: var(--accent3); }
  .drop-zone.filled { border-style: solid; border-color: var(--accent3); background: rgba(6,214,160,0.15); color: var(--text); font-size: 0.78rem; padding: 0 10px; }
  .drop-zone.wrong-drop { border-color: var(--accent1); background: rgba(255,107,107,0.15); color: var(--accent1); animation: shake 0.4s ease; }

  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  /* GAME 4: ZWECK */
  .zweck-scenario {
    background: linear-gradient(135deg, rgba(255,209,102,0.12), rgba(255,107,107,0.08));
    border: 2px solid rgba(255,209,102,0.3);
    border-radius: 14px;
    padding: 20px 22px;
    margin-bottom: 22px;
    text-align: center;
  }
  .zweck-scenario .scenario-icon { font-size: 2.8rem; margin-bottom: 10px; }
  .zweck-scenario h3 {
    font-family: 'Fredoka One', sans-serif;
    font-size: 1.15rem;
    color: var(--accent2);
    margin-bottom: 8px;
  }
  .zweck-scenario p { font-size: 0.9rem; color: var(--text); font-weight: 600; line-height: 1.5; }

  .zweck-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .zweck-option {
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 14px 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .zweck-option:hover:not(:disabled) { background: rgba(255,255,255,0.09); border-color: var(--accent4); transform: scale(1.02); }
  .zweck-option svg { width: 70px; height: 70px; }
  .zweck-option .opt-name { font-weight: 800; font-size: 0.88rem; text-align: center; }
  .zweck-option.correct { background: rgba(6,214,160,0.2); border-color: var(--accent3); }
  .zweck-option.wrong { background: rgba(255,107,107,0.18); border-color: var(--accent1); }
  .zweck-option:disabled { cursor: default; }

  /* BUTTON */
  .btn-primary {
    background: linear-gradient(135deg, var(--accent3), var(--accent4));
    border: none; border-radius: 12px;
    padding: 13px 26px; color: #0f0e17;
    font-family: 'Fredoka One', sans-serif; font-size: 1.05rem;
    cursor: pointer; transition: all 0.2s ease;
    box-shadow: 0 4px 18px rgba(6,214,160,0.3);
    margin-top: 14px; display: block; width: 100%;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(6,214,160,0.4); }

  /* CELEBRATION */
  .celebration {
    position: fixed; inset: 0; z-index: 100;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(15,14,23,0.92);
    backdrop-filter: blur(8px);
  }
  .celebration.show { display: flex; }
  .celebration-card {
    background: var(--card); border-radius: 24px;
    padding: 44px 36px; text-align: center;
    border: 2px solid var(--accent3);
    box-shadow: 0 0 60px rgba(6,214,160,0.3);
    max-width: 390px; width: 90%;
  }
  .celebration-emoji { font-size: 3.8rem; margin-bottom: 14px; }
  .celebration h2 {
    font-family: 'Fredoka One', sans-serif; font-size: 2rem;
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 8px;
  }
  .celebration p { color: var(--text-muted); margin-bottom: 20px; font-size: 1rem; font-weight: 600; }
  .celebration .final-score { font-family: 'Fredoka One', sans-serif; font-size: 3.2rem; color: var(--accent2); margin-bottom: 20px; }

  .dot {
    position: fixed; width: 10px; height: 10px;
    border-radius: 50%; pointer-events: none;
    animation: fall 3s ease-in forwards; z-index: 99;
  }
  @keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

  @media (max-width: 620px) {
    .game-selector { grid-template-columns: repeat(2, 1fr); }
    .memory-grid { grid-template-columns: repeat(4, 1fr); gap: 5px; }
    .answer-grid, .zweck-grid { grid-template-columns: 1fr 1fr; }
    .drop-row { flex-wrap: wrap; }
    .drop-zone { min-width: 100px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>⚗️ Labor-Quiz</h1>
    <p>Werde zum Chemie-Profi! Kennst du alle Laborgeräte?</p>
  </div>

  <div class="score-bar">
    <div class="score-item">
      <div class="score-label">Punkte</div>
      <div class="score-value" id="total-score">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">Richtig</div>
      <div class="score-value green" id="correct-count">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">Falsch</div>
      <div class="score-value red" id="wrong-count">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">Serie</div>
      <div class="score-value" id="streak-count">🔥 0</div>
    </div>
  </div>

  <div class="game-selector">
    <div class="game-tab active" onclick="switchGame(0)" id="tab0"><span class="tab-icon">🔍</span>Bild-Quiz</div>
    <div class="game-tab" onclick="switchGame(1)" id="tab1"><span class="tab-icon">🃏</span>Memory</div>
    <div class="game-tab" onclick="switchGame(2)" id="tab2"><span class="tab-icon">🎯</span>Zuordnung</div>
    <div class="game-tab" onclick="switchGame(3)" id="tab3"><span class="tab-icon">🧩</span>Wozu brauche ich…?</div>
  </div>

  <div class="game-area" id="game-area"></div>
</div>

<div class="celebration" id="celebration">
  <div class="celebration-card">
    <div class="celebration-emoji" id="cel-emoji">🏆</div>
    <h2 id="cel-title">Super!</h2>
    <p id="cel-msg">Das war großartig!</p>
    <div class="final-score" id="cel-score">0 Punkte</div>
    <button class="btn-primary" onclick="hideCelebration()">Weiter spielen! 🚀</button>
  </div>
</div>

<script>
// ============================================================
// DEVICE DATA
// ============================================================
const devices = [
  {
    id: 0, name: "Becherglas",
    hint: "Zum Aufbewahren und Erhitzen von Flüssigkeiten",
    description: "Zylindrisches Gefäß mit Ausguss-Schnabel – keine genaue Skala.",
    uses: ["Flüssigkeiten erhitzen", "Lösungen ansetzen", "Flüssigkeiten aufbewahren"],
    svg: `<svg viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="20" y="10" width="60" height="90" rx="4" stroke="#06d6a0" stroke-width="3" fill="rgba(6,214,160,0.08)"/>
      <line x1="20" y1="100" x2="80" y2="100" stroke="#06d6a0" stroke-width="3"/>
      <path d="M75 10 Q84 10 84 16" stroke="#06d6a0" stroke-width="2" fill="none"/>
      <line x1="26" y1="40" x2="36" y2="40" stroke="#06d6a0" stroke-width="1.5" opacity="0.5"/>
      <line x1="26" y1="60" x2="36" y2="60" stroke="#06d6a0" stroke-width="1.5" opacity="0.5"/>
      <line x1="26" y1="80" x2="36" y2="80" stroke="#06d6a0" stroke-width="1.5" opacity="0.5"/>
    </svg>`
  },
  {
    id: 1, name: "Erlenmeyerkolben",
    hint: "Kegelförmiger Kolben mit schmalem Hals und breiter Basis",
    description: "Kegelförmiger Kolben – ideal zum Schwenken ohne Verspritzen.",
    uses: ["Flüssigkeiten schwenken", "Titrationen durchführen", "Reaktionen beobachten"],
    svg: `<svg viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M40 10 L40 50 L10 100 L90 100 L60 50 L60 10 Z" stroke="#ff6b6b" stroke-width="3" fill="rgba(255,107,107,0.08)"/>
      <line x1="30" y1="10" x2="70" y2="10" stroke="#ff6b6b" stroke-width="3"/>
      <line x1="10" y1="100" x2="90" y2="100" stroke="#ff6b6b" stroke-width="3"/>
      <line x1="33" y1="30" x2="67" y2="30" stroke="#ff6b6b" stroke-width="1.5" opacity="0.45"/>
    </svg>`
  },
  {
    id: 2, name: "Reagenzglas",
    hint: "Kleines Glasröhrchen mit rundem Boden",
    description: "Kleines Glasröhrchen – für kleine Mengen und einfache Reaktionen.",
    uses: ["Kleine Reaktionen durchführen", "Stoffe kurz erhitzen", "Proben aufbewahren"],
    svg: `<svg viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M35 5 L35 90 Q35 108 50 108 Q65 108 65 90 L65 5 Z" stroke="#ffd166" stroke-width="3" fill="rgba(255,209,102,0.08)"/>
      <line x1="35" y1="5" x2="65" y2="5" stroke="#ffd166" stroke-width="3"/>
      <line x1="38" y1="30" x2="48" y2="30" stroke="#ffd166" stroke-width="1.5" opacity="0.5"/>
      <line x1="38" y1="55" x2="48" y2="55" stroke="#ffd166" stroke-width="1.5" opacity="0.5"/>
      <line x1="38" y1="78" x2="48" y2="78" stroke="#ffd166" stroke-width="1.5" opacity="0.5"/>
    </svg>`
  },
  {
    id: 3, name: "Messkolben",
    hint: "Birnenförmiger Kolben mit langem, dünnem Hals",
    description: "Birnenförmiger Kolben mit Ringmarkierung – für exaktes Abmessen.",
    uses: ["Lösungen exakt herstellen", "Genaue Volumina messen"],
    svg: `<svg viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="50" cy="85" rx="35" ry="28" stroke="#118ab2" stroke-width="3" fill="rgba(17,138,178,0.08)"/>
      <line x1="44" y1="57" x2="44" y2="10" stroke="#118ab2" stroke-width="3"/>
      <line x1="56" y1="57" x2="56" y2="10" stroke="#118ab2" stroke-width="3"/>
      <line x1="44" y1="10" x2="56" y2="10" stroke="#118ab2" stroke-width="3"/>
      <line x1="40" y1="33" x2="60" y2="33" stroke="#118ab2" stroke-width="2"/>
    </svg>`
  },
  {
    id: 4, name: "Bunsenbrenner",

// ============================================================
// GLOBAL STATE
// ============================================================
let score = 0, correctCount = 0, wrongCount = 0, streak = 0;
let currentGame = 0;
let quizQueue = [], quizIdx = 0, quizAnswered = false;
let memFlipped = [], memMatched = [], memLocked = false, memCards = [];
let dragState = {};
let zweckQueue = [], zweckIdx = 0, zweckAnswered = false;

// ============================================================
// SCORE
// ============================================================
function addScore(p) { score += p; document.getElementById('total-score').textContent = score; }
function incCorrect() {
  correctCount++; streak++;
  document.getElementById('correct-count').textContent = correctCount;
  document.getElementById('streak-count').textContent = '🔥 ' + streak;
}
function incWrong() {
  wrongCount++; streak = 0;
  document.getElementById('wrong-count').textContent = wrongCount;
  document.getElementById('streak-count').textContent = '🔥 0';
}

function switchGame(idx) {
  currentGame = idx;
  document.querySelectorAll('.game-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  const area = document.getElementById('game-area');
  if (idx === 0) renderQuizGame(area);
  if (idx === 1) renderMemoryGame(area);
  if (idx === 2) renderDragGame(area);
  if (idx === 3) renderZweckGame(area);
}

// ============================================================
// GAME 1: BILD-QUIZ
// ============================================================
function renderQuizGame(area) {
  quizQueue = [...devices].sort(() => Math.random() - 0.5);
  quizIdx = 0; quizAnswered = false;
  area.innerHTML = `
    <div class="game-title"><span>🔍</span> Bild-Quiz – Welches Gerät ist das?</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="quiz-progress" style="width:0%"></div></div>
    <div class="device-svg-wrap" id="quiz-svg"></div>
    <div class="device-hint" id="quiz-hint"></div>
    <div class="answer-grid" id="quiz-answers"></div>
    <div class="feedback-msg" id="quiz-feedback"></div>
  `;
  showQuizQ();
}

function showQuizQ() {
  if (quizIdx >= quizQueue.length) { triggerCelebration('quiz'); quizIdx = 0; }
  quizAnswered = false;
  const cur = quizQueue[quizIdx];
  document.getElementById('quiz-progress').style.width = (quizIdx / quizQueue.length * 100) + '%';
  document.getElementById('quiz-svg').innerHTML = cur.svg;
  document.getElementById('quiz-hint').textContent = '💡 ' + cur.hint;
  document.getElementById('quiz-feedback').textContent = '';
  document.getElementById('quiz-feedback').className = 'feedback-msg';
  const wrong = devices.filter(d => d.id !== cur.id).sort(() => Math.random() - 0.5).slice(0, 3);
  const opts = [cur, ...wrong].sort(() => Math.random() - 0.5);
  document.getElementById('quiz-answers').innerHTML = opts.map(o =>
    `<button class="answer-btn" onclick="quizAnswer(${o.id},${cur.id},this)">${o.name}</button>`
  ).join('');
}

function quizAnswer(chosen, correct, btn) {
  if (quizAnswered) return;
  quizAnswered = true;
  const ok = chosen === correct;
  document.querySelectorAll('.answer-btn').forEach(b => { b.disabled = true; });
  const fb = document.getElementById('quiz-feedback');
  if (ok) {
    btn.classList.add('correct');
    const pts = 10 + (streak >= 2 ? streak * 2 : 0);
    fb.textContent = streak >= 2 ? `✅ Richtig! +${pts} Punkte (Serie!)` : '✅ Richtig!';
    fb.className = 'feedback-msg correct';
    addScore(pts); incCorrect();
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.answer-btn').forEach(b => {
      if (devices.find(d => d.name === b.textContent.trim())?.id === correct) b.classList.add('correct');
    });
    fb.textContent = '❌ Leider falsch!';
    fb.className = 'feedback-msg wrong';
    incWrong();
  }
  quizIdx++;
  setTimeout(showQuizQ, 1700);
}

// ============================================================
// GAME 2: MEMORY
// ============================================================
function renderMemoryGame(area) {
  memFlipped = []; memMatched = []; memLocked = false;
  const subset = [...devices].sort(() => Math.random() - 0.5).slice(0, 6);
  const pairs = [];
  subset.forEach(d => {
    pairs.push({ type: 'svg', device: d });
    pairs.push({ type: 'name', device: d });
  });
  memCards = pairs.sort(() => Math.random() - 0.5);
  area.innerHTML = `
    <div class="game-title"><span>🃏</span> Memory – Finde die passenden Paare!</div>
    <div class="memory-grid" id="mem-grid"></div>
    <div class="memory-info" id="mem-info">Klicke zwei Karten um!</div>
  `;
  const grid = document.getElementById('mem-grid');
  memCards.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = 'memory-card';
    el.dataset.idx = idx;
    el.innerHTML = `
      <div class="card-front">?</div>
      <div class="card-back ${card.type === 'name' ? 'name-card' : ''}">
        ${card.type === 'svg'
          ? card.device.svg + `<div class="card-label">${card.device.name}</div>`
          : card.device.name}
      </div>`;
    el.addEventListener('click', () => memFlip(idx, el));
    grid.appendChild(el);
  });
}

function memFlip(idx, el) {
  if (memLocked || memMatched.includes(idx) || el.classList.contains('flipped')) return;
  if (memFlipped.length === 1 && memFlipped[0].idx === idx) return;
  el.classList.add('flipped');
  memFlipped.push({ idx, el });
  if (memFlipped.length === 2) {
    memLocked = true;
    const [a, b] = memFlipped;
    const ca = memCards[a.idx], cb = memCards[b.idx];
    const match = ca.device.id === cb.device.id && ca.type !== cb.type;
    setTimeout(() => {
      if (match) {
        a.el.classList.add('matched');
        b.el.classList.add('matched');
        // Cards stay flipped – no opacity change, highlight border instead
        memMatched.push(a.idx, b.idx);
        addScore(20); incCorrect();
        document.getElementById('mem-info').textContent = '✅ Treffer! +20 Punkte';
        if (memMatched.length === memCards.length) {
          setTimeout(() => triggerCelebration('memory'), 700);
        }
      } else {
        a.el.classList.remove('flipped');
        b.el.classList.remove('flipped');
        incWrong();
        document.getElementById('mem-info').textContent = '❌ Kein Paar – nochmal versuchen!';
      }
      memFlipped = []; memLocked = false;
    }, 1000);
  }
}

// ============================================================
// GAME 3: DRAG & DROP
// ============================================================
function renderDragGame(area) {
  const subset = [...devices].sort(() => Math.random() - 0.5).slice(0, 5);
  const shuffled = [...subset].sort(() => Math.random() - 0.5);
  dragState = { dragging: null, filled: {}, total: subset.length };
  area.innerHTML = `
    <div class="game-title"><span>🎯</span> Zuordnung – Ziehe den Namen zum richtigen Gerät!</div>
    <div class="drag-area">
      <div class="devices-pool" id="names-pool">
        ${shuffled.map(d => `
          <div class="drag-chip" draggable="true" id="chip-${d.id}"
               ondragstart="onDS(event,${d.id})" ondragend="onDE(event)">
            ${d.name}
          </div>`).join('')}
      </div>
      <div class="drop-zones" id="drop-zones">
        ${subset.map(d => `
          <div class="drop-row" id="row-${d.id}">
            <div class="hint-svg-wrap" id="hsvg-${d.id}">
              ${d.svg}
            </div>
            <div class="drop-desc">${d.description}</div>
            <button class="hint-btn" id="hbtn-${d.id}" onclick="showHint(${d.id})">💡 Tipp</button>
            <div class="drop-zone" id="zone-${d.id}"
                 ondragover="onDO(event)" ondragleave="onDL(event)"
                 ondrop="onDrop(event,${d.id})">
              Name ziehen…
            </div>
          </div>`).join('')}
      </div>
    </div>
    <div class="feedback-msg" id="drag-feedback"></div>
  `;
}

function showHint(id) {
  const wrap = document.getElementById('hsvg-' + id);
  const btn = document.getElementById('hbtn-' + id);
  wrap.classList.add('visible');
  btn.disabled = true;
  btn.textContent = '👁️ Bild';
  addScore(-2); // small penalty for hint
  document.getElementById('drag-feedback').textContent = '💡 Tipp benutzt (−2 Punkte)';
  document.getElementById('drag-feedback').className = 'feedback-msg wrong';
  setTimeout(() => { document.getElementById('drag-feedback').textContent = ''; }, 1500);
}

function onDS(e, id) { dragState.dragging = id; document.getElementById('chip-' + id).classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function onDE(e) { if (dragState.dragging !== null) { const c = document.getElementById('chip-' + dragState.dragging); if (c) c.classList.remove('dragging'); } }
function onDO(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDL(e) { e.currentTarget.classList.remove('drag-over'); }

function onDrop(e, targetId) {
  e.preventDefault();
  const zone = e.currentTarget;
  zone.classList.remove('drag-over');
  const draggedId = dragState.dragging;
  if (draggedId === null || zone.classList.contains('filled')) return;
  const dev = devices.find(d => d.id === draggedId);
  const ok = draggedId === targetId;
  zone.textContent = dev.name;
  zone.classList.add('filled');
  if (ok) {
    zone.style.borderColor = 'var(--accent3)'; zone.style.color = 'var(--accent3)';
    const chip = document.getElementById('chip-' + draggedId);
    if (chip) chip.style.display = 'none';
    addScore(15); incCorrect();
    dragState.filled[targetId] = true;
    if (Object.keys(dragState.filled).length >= dragState.total) setTimeout(() => triggerCelebration('drag'), 700);
  } else {
    zone.style.borderColor = 'var(--accent1)'; zone.style.color = 'var(--accent1)';
    zone.classList.add('wrong-drop'); incWrong();
    setTimeout(() => {
      zone.textContent = 'Name ziehen…';
      zone.classList.remove('filled', 'wrong-drop');
      zone.style.borderColor = ''; zone.style.color = '';
    }, 1200);
  }
  dragState.dragging = null;
}

// ============================================================
// GAME 4: WOZU BRAUCHE ICH…?
// ============================================================
function renderZweckGame(area) {
  zweckQueue = [...scenarios].sort(() => Math.random() - 0.5);
  zweckIdx = 0; zweckAnswered = false;
  area.innerHTML = `
    <div class="game-title"><span>🧩</span> Wozu brauche ich…? – Wähle das richtige Gerät!</div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="zweck-progress" style="width:0%"></div></div>
    <div class="zweck-scenario" id="zweck-scenario"></div>
    <div class="zweck-grid" id="zweck-grid"></div>
    <div class="feedback-msg" id="zweck-feedback"></div>
  `;
  showZweckQ();
}

function showZweckQ() {
  if (zweckIdx >= zweckQueue.length) { triggerCelebration('zweck'); zweckIdx = 0; }
  zweckAnswered = false;
  const sc = zweckQueue[zweckIdx];
  document.getElementById('zweck-progress').style.width = (zweckIdx / zweckQueue.length * 100) + '%';
  document.getElementById('zweck-scenario').innerHTML = `
    <div class="scenario-icon">${sc.icon}</div>
    <h3>${sc.title}</h3>
    <p>${sc.text}</p>
  `;
  document.getElementById('zweck-feedback').textContent = '';
  document.getElementById('zweck-feedback').className = 'feedback-msg';
  const correctDev = devices.find(d => d.id === sc.correct);
  const distractorDevs = sc.distractors.map(id => devices.find(d => d.id === id));
  const opts = [correctDev, ...distractorDevs].sort(() => Math.random() - 0.5);
  document.getElementById('zweck-grid').innerHTML = opts.map(d => `
    <button class="zweck-option" onclick="zweckAnswer(${d.id}, ${sc.correct}, this)">
      ${d.svg}
      <div class="opt-name">${d.name}</div>
    </button>
  `).join('');
}

function zweckAnswer(chosen, correct, btn) {
  if (zweckAnswered) return;
  zweckAnswered = true;
  const ok = chosen === correct;
  document.querySelectorAll('.zweck-option').forEach(b => { b.disabled = true; });
  const fb = document.getElementById('zweck-feedback');
  if (ok) {
    btn.classList.add('correct');
    const pts = 10 + (streak >= 2 ? streak * 2 : 0);
    fb.textContent = streak >= 2 ? `✅ Genau! +${pts} Punkte (Serie!)` : '✅ Genau richtig!';
    fb.className = 'feedback-msg correct';
    addScore(pts); incCorrect();
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.zweck-option').forEach(b => {
      const name = b.querySelector('.opt-name')?.textContent.trim();
      const d = devices.find(d => d.name === name);
      if (d && d.id === correct) b.classList.add('correct');
    });
    fb.textContent = '❌ Nicht ganz – schau dir das richtige Gerät an!';
    fb.className = 'feedback-msg wrong';
    incWrong();
  }
  zweckIdx++;
  setTimeout(showZweckQ, 2000);
}

// ============================================================
// CELEBRATION
// ============================================================
function triggerCelebration(gameType) {
  const emojis = ['🏆','🥳','⭐','🎉','🔬'];
  const titles = ['Super gemacht!','Klasse!','Wow!','Chemie-Profi!','Mega!'];
  const msgs = { quiz: 'Alle Bilder erkannt!', memory: 'Alle Paare gefunden!', drag: 'Alle Geräte richtig zugeordnet!', zweck: 'Alle Aufgaben gelöst!' };
  document.getElementById('cel-emoji').textContent = emojis[Math.floor(Math.random() * emojis.length)];
  document.getElementById('cel-title').textContent = titles[Math.floor(Math.random() * titles.length)];
  document.getElementById('cel-msg').textContent = msgs[gameType] || 'Weiter so!';
  document.getElementById('cel-score').textContent = score + ' Punkte';
  document.getElementById('celebration').classList.add('show');
  spawnConfetti();
}

function hideCelebration() { document.getElementById('celebration').classList.remove('show'); }

function spawnConfetti() {
  const colors = ['#ff6b6b','#ffd166','#06d6a0','#118ab2','#ffffff'];
  for (let i = 0; i < 45; i++) {
    setTimeout(() => {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.style.left = Math.random() * 100 + 'vw';
      dot.style.background = colors[Math.floor(Math.random() * colors.length)];
      dot.style.width = dot.style.height = (7 + Math.random() * 9) + 'px';
      dot.style.animationDuration = (2 + Math.random() * 2) + 's';
      document.body.appendChild(dot);
      setTimeout(() => dot.remove(), 4200);
    }, i * 55);
  }
}
