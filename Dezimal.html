<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mathe-Profi: Dezimalzahlen</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #7c3aed;
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; color: var(--primary); font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 30px; }

        /* Themen-Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .theme-btn {
            background: white;
            border: 2px solid #e2e8f0;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            text-align: left;
        }

        .theme-btn:hover {
            border-color: var(--primary);
            background: #eff6ff;
            transform: translateY(-2px);
        }

        .theme-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Übungsbereich */
        #exercise-section {
            display: none;
            border-top: 2px solid #f1f5f9;
            padding-top: 30px;
            animation: fadeIn 0.5s;
        }

        .explanation-box {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 12px;
            border-left: 6px solid var(--primary);
            margin-bottom: 25px;
        }

        .level-select {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .lvl-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            background: #e2e8f0;
        }

        .lvl-btn.active { background: var(--accent); color: white; }

        /* Aufgaben-Layout */
        .task-list {
            display: grid;
            gap: 15px;
        }

        .task-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
        }

        .task-card input {
            width: 100px;
            padding: 8px;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            text-align: center;
            font-size: 1.1rem;
        }

        .task-card input.correct { border-color: var(--success); background: #ecfdf5; }
        .task-card input.wrong { border-color: var(--danger); background: #fef2f2; }

        /* Komma-Animation */
        #comma-viz {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-family: monospace;
            background: #1e293b;
            color: #fff;
            border-radius: 12px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .moving-comma {
            color: var(--accent);
            font-weight: bold;
            position: relative;
            display: inline-block;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Spiele-Bereich */
        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 50px;
        }

        .game-card {
            background: var(--secondary);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🔢 Dezimal-Meister</h1>
    <p class="subtitle">Wähle ein Thema und werde zum Mathe-Profi!</p>

    <div class="grid" id="theme-menu">
        <button class="theme-btn" onclick="selectTheme(1)">1. Vergleichen</button>
        <button class="theme-btn" onclick="selectTheme(2)">2. Ordnen</button>
        <button class="theme-btn" onclick="selectTheme(3)">3. Runden</button>
        <button class="theme-btn" onclick="selectTheme(4)">4. Kopf-Rechnen (+/-)</button>
        <button class="theme-btn" onclick="selectTheme(5)">5. Schriftlich (+/-)</button>
        <button class="theme-btn" onclick="selectTheme(6)">6. Stufenzahlen</button>
        <button class="theme-btn" onclick="selectTheme(7)">7. ×/÷ Nat. Zahlen</button>
        <button class="theme-btn" onclick="selectTheme(8)">8. Dezimal × Dezimal</button>
    </div>

    <div id="exercise-section">
        <h2 id="current-title">Thema</h2>
        
        <div id="comma-viz-container" style="display:none;">
            <p><strong>Vorschau: Komma-Verschiebung</strong></p>
            <div id="comma-viz">1 2 3 <span class="moving-comma" id="the-comma">,</span> 4 5</div>
            <button onclick="animateComma()">Animation starten</button>
        </div>

        <div class="explanation-box" id="explanation">Erklärung folgt...</div>

        <div class="level-select">
            <button class="lvl-btn active" onclick="setLevel(1, this)">Level 1</button>
            <button class="lvl-btn" onclick="setLevel(2, this)">Level 2</button>
            <button class="lvl-btn" onclick="setLevel(3, this)">Level 3</button>
        </div>

        <div id="task-container" class="task-list"></div>
        
        <div style="margin-top: 30px; text-align: center;">
            <button onclick="checkResults()" style="padding: 15px 40px; background: var(--success); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 1.1rem; font-weight: bold;">Ergebnisse prüfen!</button>
            <button onclick="generateTasks()" style="padding: 15px 20px; background: #64748b; color: white; border: none; border-radius: 10px; cursor: pointer; margin-left: 10px;">Neue Aufgaben</button>
        </div>
    </div>

    <div class="games-grid">
        <div class="game-card" onclick="alert('Blitzquiz startet... (Demomodus)')">
            <h3>⚡ Blitzquiz</h3>
            <p>Löse 10 Aufgaben in 30 Sekunden!</p>
        </div>
        <div class="game-card" style="background: #db2777;" onclick="alert('Raketenrennen startet... (Demomodus)')">
            <h3>🚀 Raketenrennen</h3>
            <p>Sei schneller als der Computer!</p>
        </div>
    </div>
</div>

<script>
    let currentTheme = 0;
    let currentLevel = 1;
    let tasks = [];

    const content = {
        1: { title: "Dezimalzahlen vergleichen", info: "Schau dir die Stellen von links nach rechts an. Tipp: Ergänze Nullen am Ende, damit beide Zahlen gleich viele Stellen haben!" },
        2: { title: "Ordnen", info: "Sortiere die Zahlen von klein nach groß. Gib sie durch Komma getrennt ein." },
        3: { title: "Runden", info: "Runde auf die gesuchte Stelle. Bei 0-4 abrunden, bei 5-9 aufrunden!" },
        4: { title: "Kopfrechnen", info: "Addiere oder subtrahiere im Kopf. Achte darauf, dass das Komma an der richtigen Stelle bleibt." },
        5: { title: "Schriftlich Rechnen", info: "Wichtig: Schreibe die Zahlen immer Komma unter Komma! (Hier das Ergebnis eingeben)" },
        6: { title: "Stufenzahlen (10, 100...)", info: "Multiplizieren: Komma nach RECHTS. Dividieren: Komma nach LINKS. Anzahl der Nullen = Anzahl der Schritte." },
        7: { title: "Multiplikation/Division", info: "Rechne erst ohne Komma und setze es im Ergebnis an die gleiche Stelle wie in der Aufgabe." },
        8: { title: "Dezimal × Dezimal", info: "Zähle die Nachkommastellen beider Zahlen. Das Ergebnis muss genau so viele Stellen haben!" }
    };

    function selectTheme(id) {
        currentTheme = id;
        document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('exercise-section').style.display = 'block';
        document.getElementById('current-title').innerText = content[id].title;
        document.getElementById('explanation').innerText = content[id].info;
        
        document.getElementById('comma-viz-container').style.display = (id === 6) ? 'block' : 'none';
        
        generateTasks();
    }

    function setLevel(lvl, btn) {
        currentLevel = lvl;
        document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        generateTasks();
    }

    function generateTasks() {
        const container = document.getElementById('task-container');
        container.innerHTML = "";
        tasks = [];

        for(let i=0; i<6; i++) {
            let task = createRandomTask();
            tasks.push(task);

            let div = document.createElement('div');
            div.className = 'task-card';
            div.innerHTML = `
                <span><strong>${i+1}.</strong> ${task.q}</span>
                <input type="text" id="input-${i}" placeholder="Ergebnis">
            `;
            container.appendChild(div);
        }
    }

    function createRandomTask() {
        let a, b, q, ans;
        const fix = (n, d) => n.toFixed(d).replace('.', ',');

        switch(currentTheme) {
            case 1: // Vergleichen
                a = (Math.random() * 10).toFixed(currentLevel);
                b = (Math.random() * 10).toFixed(currentLevel);
                q = `${a.replace('.',',')} [ ? ] ${b.replace('.',',')}`;
                ans = parseFloat(a) > parseFloat(b) ? ">" : (parseFloat(a) < parseFloat(b) ? "<" : "=");
                break;
            case 3: // Runden
                a = Math.random() * 10;
                q = `Runde ${a.toFixed(3).replace('.',',')} auf ${currentLevel === 1 ? 'Einer' : 'Zehntel'}`;
                ans = a.toFixed(currentLevel === 1 ? 0 : 1).replace('.', ',');
                break;
            case 6: // Stufenzahlen
                a = (Math.random() * 20).toFixed(2);
                let stufe = Math.pow(10, Math.floor(Math.random() * 3) + 1);
                let op = Math.random() > 0.5 ? "*" : "/";
                q = `${a.replace('.',',')} ${op === '*' ? '•' : ':'} ${stufe}`;
                ans = op === '*' ? (a * stufe) : (a / stufe);
                ans = ans.toString().replace('.', ',');
                break;
            default: // Standard Addition für Demo
                a = (Math.random() * 5).toFixed(1);
                b = (Math.random() * 5).toFixed(1);
                q = `${a.replace('.',',')} + ${b.replace('.',',')}`;
                ans = (parseFloat(a) + parseFloat(b)).toFixed(1).replace('.', ',');
        }
        return { q, ans };
    }

    function checkResults() {
        tasks.forEach((task, i) => {
            const input = document.getElementById(`input-${i}`);
            if(input.value.trim().replace('.', ',') === task.ans) {
                input.className = "correct";
            } else {
                input.className = "wrong";
                input.value += ` (${task.ans})`;
            }
        });
    }

    function animateComma() {
        const comma = document.getElementById('the-comma');
        comma.style.transform = "translateX(60px)";
        setTimeout(() => {
            comma.style.transform = "translateX(0px)";
        }, 1500);
    }
</script>

</body>
</html>
