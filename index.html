const LESSON_DEFS = LESSON_ORDER.map(name => ({
  name,
  words: RAW[name] || [],
  isPhrase: name.startsWith("Phrasen"),
  level: name.startsWith("A1")?"A1":name.startsWith("A2")?"A2":name.startsWith("B1")?"B1":name.startsWith("B2")?"B2":name.startsWith("C1")?"C1":"Phrasen"
}));

const TOTAL_GOAL = LESSON_DEFS.reduce((s,ld)=>s+ld.words.length,0);
const SESSION_SIZE = 20;
const PHASE_LBL = {0:"neu",1:"1. Wdh.",2:"2. Wdh.",3:"gelernt",4:"bereits bekannt"};

const STORAGE_KEY = "itpro_v4";

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}"); } catch { return {}; }
}
function saveState(st) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(st)); } catch {}
}
function getCard(st, ln, word) {
  const k = ln+"__"+word;
  if (!st[k]) st[k] = {phase:0};
  return st[k];
}
function lessonMastered(st, ld) {
  // phase 3 = gelernt, phase 4 = bereits bekannt — both count
  return ld.words.filter(w=>{ const c=getCard(st,ld.name,w.it); return c.phase>=3; }).length;
}
function isUnlocked(st, ld, idx) {
  if (idx===0) return true;
  if (ld.isPhrase) return true; // Phrasen immer freigeschaltet
  const prev = LESSON_DEFS[idx-1];
  if (prev.isPhrase) return true;
  return lessonMastered(st,prev) >= Math.floor(prev.words.length*0.6);
}
function totalDone(st) {
  let n=0;
  LESSON_DEFS.forEach(ld=>ld.words.forEach(w=>{
    if(getCard(st,ld.name,w.it).phase>=3) n++;
  }));
  return n;
}
function shuffle(a) { return [...a].sort(()=>Math.random()-.5); }

function exportProgress(st) {
  const blob = new Blob([JSON.stringify({version:4,data:st},null,2)],{type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "italiano_fortschritt.json";
  a.click();
  URL.revokeObjectURL(url);
}

function App() {
  const [st, setSt] = useState(()=>loadState());
  const [curLesson, setCurLesson] = useState(null);
  const [session, setSession] = useState([]);
  const [sidx, setSidx] = useState(0);
  const [revealed, setRevealed] = useState(false);
  const [view, setView] = useState("lessons");
  const [importMsg, setImportMsg] = useState(null);
  const fileRef = useRef(null);

  const persist = useCallback((newSt)=>{ setSt(newSt); saveState(newSt); }, []);

  function buildSession(ld, stRef) {
    const active = ld.words.filter(w=>{
      const c = getCard(stRef, ld.name, w.it);
      return c.phase < 3; // phase 3 = gelernt (still practise), phase 4 = bekannt (skip)
    });
    // phase 3 = "gelernt" → can repeat; phase 0,1,2 = priority
    const needRepeat = active.filter(w=>getCard(stRef,ld.name,w.it).phase===3);
    const needLearn = active.filter(w=>getCard(stRef,ld.name,w.it).phase<3);
    let picked = [...needLearn.slice(0,SESSION_SIZE)];
    if (picked.length < SESSION_SIZE) picked = picked.concat(needRepeat.slice(0, SESSION_SIZE-picked.length));
    if (picked.length === 0) picked = needLearn.concat(needRepeat);
    if (picked.length === 0) return [];
    return shuffle(picked).slice(0, SESSION_SIZE);
  }

  function selectLesson(ld) {
    setCurLesson(ld);
    const sess = buildSession(ld, st);
    setSession(sess);
    setSidx(0);
    setRevealed(false);
    setView(sess.length===0?"end":"study");
  }

  function doAnswer(correct, known) {
    const w = session[sidx];
    const newSt = {...st};
    const c = getCard(newSt, curLesson.name, w.it);
    if (known) {
      c.phase = 4; // bereits bekannt — für immer raus
    } else if (correct) {
      if (c.phase < 3) c.phase++;
      // phase 3 = "Gewusst" abgeschlossen, bleibt wiederhol­bar
    } else {
      if (c.phase > 1) c.phase = 1; else c.phase = Math.max(0, c.phase);
    }
    persist(newSt);
    const next = sidx+1;
    if (next >= session.length) { setView("end"); } else { setSidx(next); setRevealed(false); }
  }

  function handleImport(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const data = parsed.data || parsed;
        persist(data);
        setImportMsg("✓ Fortschritt geladen!");
        setTimeout(()=>setImportMsg(null),3000);
      } catch {
        setImportMsg("⚠ Fehler beim Laden.");
        setTimeout(()=>setImportMsg(null),3000);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  const done = totalDone(st);
  const pct = Math.min(100, Math.round(done/TOTAL_GOAL*100));

  function lessonStats(ld) {
    let neu=0, lernen=0, gelernt=0, bekannt=0;
    ld.words.forEach(w=>{
      const c = getCard(st,ld.name,w.it);
      if (c.phase===4) bekannt++;
      else if (c.phase===3) gelernt++;
      else if (c.phase===0) neu++;
      else lernen++;
    });
    return {neu,lernen,gelernt,bekannt};
  }

  const curStats = curLesson ? lessonStats(curLesson) : {neu:0,lernen:0,gelernt:0,bekannt:0};
  const vocabLessons = LESSON_DEFS.filter(l=>!l.isPhrase);

    lv, lessons: vocabLessons.filter(l=>l.level===lv)
  }));

    phases:{display:"flex",gap:6,marginBottom:14},
    ph:(active,type)=>{
      const bg=active?(type===1?colors.goldbg:type===2?colors.sage1:type===3?colors.sage6:type===4?colors.purplebg:colors.bg2):colors.bg2;
      const cl=active?(type===1?colors.gold:type===2?colors.sage8:type===3?"#fff":type===4?colors.purple:colors.txm):colors.txm;
      return {flex:1,textAlign:"center",padding:"4px 4px",borderRadius:16,fontSize:10,border:`1px solid ${active&&type===1?colors.goldbr:active&&type>=2?colors.sage2:colors.bg3}`,background:bg,color:cl};
    },
    flashcard:(isPhrase)=>({border:`1.5px solid ${isPhrase?colors.rosebr:colors.sage2}`,borderLeft:isPhrase?`3px solid ${colors.rosebr}`:undefined,borderRadius:14,padding:"28px 16px",textAlign:"center",cursor:"pointer",minHeight:180,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",marginBottom:14,background:colors.bg,position:"relative",WebkitTapHighlightColor:"transparent"}),
    badge:(phase)=>{
      const bg=phase===0?colors.bg2:phase===1?colors.goldbg:phase===2?colors.sage1:phase===3?colors.sage6:colors.purplebg;
      const cl=phase===0?colors.txm:phase===1?colors.gold:phase===2?colors.sage8:phase===3?"#fff":colors.purple;
      return {position:"absolute",top:10,right:12,fontSize:11,padding:"3px 9px",borderRadius:10,fontWeight:500,background:bg,color:cl};
    },
    fcArt:{fontSize:13,color:colors.txm,marginBottom:4},
    fcIt:{fontSize:28,fontWeight:500,color:colors.sage8,lineHeight:1.3},
    fcTap:{fontSize:12,color:colors.txl,marginTop:10},
    fcHint:{fontSize:12,color:colors.txm,marginTop:6,fontStyle:"italic"},
    fcReveal:{marginTop:14,borderTop:`1px solid ${colors.sage1}`,paddingTop:14,width:"100%"},
    fcDe:{fontSize:20,color:colors.tx,fontWeight:500},
    fcEx:{fontSize:12,color:colors.txm,marginTop:8,fontStyle:"italic"},
    btnRow:{display:"flex",gap:8,justifyContent:"center",flexWrap:"wrap",marginBottom:8},
    btn:(type)=>{
      const styles={
        show:{bg:colors.bg2,border:colors.sage2,cl:colors.tx},
        wrong:{bg:colors.redbg,border:colors.redbr,cl:colors.red},
        right:{bg:colors.sage1,border:colors.sage2,cl:colors.sage8},
        next:{bg:colors.sage6,border:colors.sage6,cl:"#fff"},
        known:{bg:colors.purplebg,border:colors.purplebr,cl:colors.purple}
      };
      const t=styles[type];
      return {padding:"11px 20px",borderRadius:22,fontSize:13,cursor:"pointer",border:`1.5px solid ${t.border}`,background:t.bg,color:t.cl,fontWeight:500,WebkitTapHighlightColor:"transparent",minWidth:90};
    },
    knownNote:{fontSize:11,color:colors.txl,textAlign:"center",marginBottom:8},
    endBox:{background:colors.sage1,border:`1.5px solid ${colors.sage2}`,borderRadius:14,padding:"1.5rem",textAlign:"center"},
    endH:{color:colors.sage8,fontSize:18,marginBottom:6,fontWeight:500},
    endP:{color:colors.txm,fontSize:13,marginBottom:14},
    backBtn:{fontSize:13,color:colors.sage6,background:"none",border:"none",cursor:"pointer",marginBottom:10,padding:"4px 0"},
  };

  function LessonCard({ld}) {
    const idx = LESSON_DEFS.indexOf(ld);
    const unlocked = isUnlocked(st,ld,idx);
    const doneCnt = lessonMastered(st,ld);
    const p = Math.round(doneCnt/ld.words.length*100);
    const isSel = curLesson&&curLesson.name===ld.name;
    const isComp = p>=70;
    return (
      <div style={s.card(unlocked,isSel,isComp,ld.isPhrase)} onClick={()=>unlocked&&selectLesson(ld)}>
        <div style={s.lcName}>{ld.name.replace(/^[A-Z0-9]+ – /,"").replace(/^Phrasen – /,"")}</div>
        <div style={s.lcCount}>{ld.words.length} Wörter · {p}%</div>
        <div style={s.lcBar}><div style={s.lcFill(p)}/></div>
        {ld.isPhrase&&<span style={s.lcTag}>Phrasen</span>}
        {!unlocked&&<span style={s.lockIcon}>🔒</span>}
        {isComp&&unlocked&&<span style={s.doneIcon}>✓</span>}
      </div>
    );
  }

  return (
    <div style={s.wrap}>
      <div style={s.title}>🇮🇹 Italiano Vokabeltrainer</div>

      <div style={s.goalBox}>
        <div style={s.goalTop}>
          <span style={s.goalLabel}>Gesamtfortschritt ({TOTAL_GOAL} Wörter)</span>
          <span style={s.goalPct}>{pct}%</span>
        </div>
        <div style={s.track}><div style={s.fill}/></div>
        <div style={s.goalSub}>{done} von {TOTAL_GOAL} Wörtern gelernt</div>
      </div>

      {/* Export / Import */}
      <div style={s.ioRow}>
        {importMsg&&<span style={s.importMsg}>{importMsg}</span>}
        <button style={s.ioBtn} onClick={()=>exportProgress(st)}>⬇ Fortschritt exportieren</button>
        <button style={s.ioBtn} onClick={()=>fileRef.current&&fileRef.current.click()}>⬆ Importieren</button>
        <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={handleImport}/>
      </div>

      {curLesson&&(
        <div style={s.statsRow}>
          <div style={s.stat}><div style={s.statN}>{curStats.neu}</div><div style={s.statL}>Neu</div></div>
          <div style={s.stat}><div style={s.statN}>{curStats.lernen}</div><div style={s.statL}>In Übung</div></div>
          <div style={s.stat}><div style={s.statN}>{curStats.gelernt}</div><div style={s.statL}>Gelernt</div></div>
          <div style={s.stat}><div style={s.statN}>{curStats.bekannt}</div><div style={s.statL}>Bekannt</div></div>
        </div>
      )}

      {view==="study"&&w&&(
        <div>
          <button style={s.backBtn} onClick={()=>setView("lessons")}>← Lektionen</button>
          <div style={s.panel}>
            <div style={s.studyTop}>
              <span style={s.studyName}>{curLesson.name}</span>
              <span style={s.studyProg}>{sidx+1} / {session.length}</span>
            </div>
            <div style={s.phases}>
              {[0,1,2,3].map(i=>(
                <div key={i} style={s.ph(c&&c.phase===i,i)}>
                  {i===0?"Neu":i===1?"1. Wdh.":i===2?"2. Wdh.":"Gelernt"}
                </div>
              ))}
            </div>
            <div style={s.flashcard(!!w.phrase)} onClick={()=>!revealed&&setRevealed(true)}>
              <span style={s.badge(c?c.phase:0)}>{PHASE_LBL[c?c.phase:0]}</span>
              {!w.phrase&&<div style={s.fcArt}>{w.art||""}</div>}
              <div style={s.fcIt}>{w.it}</div>
              {w.phrase&&<div style={s.fcHint}>Phrasen-Karte — was bedeutet das?</div>}
              {!revealed&&<div style={s.fcTap}>Tippen zum Aufdecken</div>}
              {revealed&&(
                <div style={s.fcReveal}>
                  <div style={s.fcDe}>{w.de}</div>
                  <div style={s.fcEx}>{w.ex}</div>
                </div>
              )}
            </div>
            <div style={s.btnRow}>
              {!revealed
                ?<button style={s.btn("show")} onClick={()=>setRevealed(true)}>Aufdecken</button>
                :<>
                  <button style={s.btn("wrong")} onClick={()=>doAnswer(false,false)}>Noch nicht</button>
                  <button style={s.btn("right")} onClick={()=>doAnswer(true,false)}>Gewusst!</button>
                  <button style={s.btn("known")} onClick={()=>doAnswer(false,true)}>Bereits bekannt</button>
                </>
              }
            </div>
            {revealed&&<div style={s.knownNote}>„Bereits bekannt" entfernt die Karte dauerhaft aus allen Übungen.</div>}
          </div>
        </div>
      )}

      {view==="end"&&curLesson&&(
        <div>
          <button style={s.backBtn} onClick={()=>setView("lessons")}>← Lektionen</button>
          <div style={s.endBox}>
            <div style={s.endH}>Super gemacht! 🎉</div>
            <div style={s.endP}>
              {session.length} Karten · {lessonMastered(st,curLesson)} von {curLesson.words.length} gelernt ({Math.round(lessonMastered(st,curLesson)/curLesson.words.length*100)}%)
            </div>
            <button style={s.btn("next")} onClick={()=>selectLesson(curLesson)}>Neue Runde</button>
          </div>
        </div>
      )}

      {view==="lessons"&&(
        <div>
          {levelGroups.map(({lv,lessons})=>(
            <div key={lv}>
              <div style={s.levelLabel}>── {lv} ──</div>
              <div style={s.grid}>{lessons.map(ld=><LessonCard key={ld.name} ld={ld}/>)}</div>
            </div>
          ))}
          <div style={s.levelLabel}>── Phrasen ──</div>
          <div style={s.grid}>{phraseLessons.map(ld=><LessonCard key={ld.name} ld={ld}/>)}</div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
