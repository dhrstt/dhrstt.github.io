<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Projekt-Hub</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #1e293b;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            border: 1px solid #e2e8f0;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }

        .icon {
            font-size: 1.5rem;
            margin-right: 15px;
        }

        .loading {
            text-align: center;
            font-style: italic;
            color: #64748b;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Projekt Dashboard</h1>
        <p>Automatische Übersicht meiner HTML-Seiten</p>
    </header>

    <div id="link-container" class="grid">
        <p class="loading">Suche nach Dateien...</p>
    </div>
</div>

<script>
    // --- BITTE HIER ANPASSEN ---
    const GITHUB_USER = 'dhrstt'; 
    const REPO_NAME = 'dhrstt.github.io';
    // ---------------------------

    async function fetchFiles() {
        const container = document.getElementById('link-container');
        try {
            const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/`);
            const files = await response.json();

            container.innerHTML = ''; // Lade-Text entfernen

            // Filter: Nur HTML-Dateien, aber nicht die index.html selbst
            const htmlFiles = files.filter(file => 
                file.name.endsWith('.html') && file.name !== 'index.html'
            );

            if (htmlFiles.length === 0) {
                container.innerHTML = '<p>Keine weiteren HTML-Seiten gefunden.</p>';
                return;
            }

            htmlFiles.forEach(file => {
                const card = document.createElement('a');
                card.href = file.name;
                card.className = 'card';
                
                // Wir machen den Dateinamen hübsch (Entferne .html und mache ersten Buchstaben groß)
                const displayName = file.name.replace('.html', '').replace(/-/g, ' ');
                
                card.innerHTML = `
                    <span class="icon">📄</span>
                    <div>
                        <strong style="display:block; text-transform: capitalize;">${displayName}</strong>
                        <small style="color: #64748b;">Klicken zum Öffnen</small>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (error) {
            container.innerHTML = '<p>Fehler beim Laden der Dateien. Prüfe Benutzernamen und Repo-Namen im Script!</p>';
            console.error(error);
        }
    }

    fetchFiles();
</script>

</body>
</html>
